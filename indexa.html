<!DOCTYPE html><html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<title>OptiCut Pro</title>
</head><body class="bg-slate-100 text-slate-900"><div class="flex"><!-- SIDEBAR --><aside class="w-64 bg-white h-screen p-4 border-r">
<h1 class="font-bold text-lg mb-6">OptiCut Pro</h1>
<button onclick="optimize()" class="w-full bg-blue-600 text-white py-2 rounded mb-2">Optimize</button>
<button onclick="exportJSON()" class="w-full bg-gray-500 text-white py-2 rounded mb-2">Export JSON</button>
<button onclick="exportPDF()" class="w-full bg-red-500 text-white py-2 rounded">Export PDF</button>
</aside><!-- MAIN --><main class="flex-1 p-6 space-y-6 overflow-auto"><!-- MATERIAL --><div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">Material</h2>
<div class="grid grid-cols-5 gap-2">
<input id="matName" placeholder="Name" class="border p-2">
<input id="matL" type="number" placeholder="Länge" class="border p-2">
<input id="matW" type="number" placeholder="Breite" class="border p-2">
<input id="matQ" type="number" placeholder="Anzahl" class="border p-2">
<label class="flex items-center"><input id="matGrain" type="checkbox"> Grain</label>
</div>
<button onclick="addMaterial()" class="mt-2 bg-blue-500 text-white px-4 py-1">Add</button>
<ul id="materials" class="mt-3 text-sm"></ul>
</div><!-- CUT LIST --><div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">Zuschnittliste</h2>
<div class="grid grid-cols-6 gap-2">
<select id="cutType" class="border p-2">
<option value="rect">Rect</option>
<option value="tri">Tri</option>
<option value="trap">Trap</option>
</select>
<input id="cutW" type="number" placeholder="L" class="border p-2">
<input id="cutH" type="number" placeholder="H" class="border p-2">
<input id="cutCH" type="number" placeholder="Cut" class="border p-2">
<input id="cutQ" type="number" placeholder="Qty" class="border p-2">
<button onclick="addCut()" class="bg-green-500 text-white">Add</button>
</div>
<ul id="cuts" class="mt-3 text-sm"></ul>
</div><!-- RESULT --><div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">Result</h2>
<div id="result"></div>
</div><div id="canvasContainer" class="grid grid-cols-3 gap-4"></div></main>
</div><script>
let appState = { materials: [], cuts: [] };

function addMaterial(){
    appState.materials.push({
        name: matName.value,
        length: +matL.value,
        width: +matW.value,
        qty: +matQ.value,
        grain: matGrain.checked
    });
    render();
}

function addCut(){
    appState.cuts.push({
        type: cutType.value,
        w: +cutW.value,
        h: +cutH.value,
        cutH: +cutCH.value || 0,
        qty: +cutQ.value
    });
    render();
}

function render(){
    materials.innerHTML = appState.materials.map(m=>`<li>${m.name} ${m.length}x${m.width} (${m.qty}) ${m.grain?'[grain]':''}</li>`).join('');
    cuts.innerHTML = appState.cuts.map(c=>`<li>${c.type} ${c.w}x${c.h} (${c.qty})</li>`).join('');
}

function areaRect(w,h){return w*h}
function areaTri(w,h){return w*h/2}
function areaTrap(w,h,ch){return w*(h+ch)/2}

function cutArea(c){
    if(c.type==='rect') return areaRect(c.w,c.h);
    if(c.type==='tri') return areaTri(c.w,c.h);
    return areaTrap(c.w,c.h,c.cutH);
}

function getOrientations(cut, grain){
    return grain ? [{w:cut.w,h:cut.h}] : [{w:cut.w,h:cut.h},{w:cut.h,h:cut.w}];
}

function optimize(){
    let cutsExpanded=[];
    appState.cuts.forEach(c=>{for(let i=0;i<c.qty;i++) cutsExpanded.push({...c});});
    cutsExpanded.sort((a,b)=>cutArea(b)-cutArea(a));

    let sheets=[];
    appState.materials.forEach(m=>{
        for(let i=0;i<m.qty;i++){
            sheets.push({m,free:[{x:0,y:0,w:m.length,h:m.width}],used:[]});
        }
    });

    cutsExpanded.forEach(cut=>{
        outer:
        for(let s of sheets){
            for(let f of s.free){
                for(let o of getOrientations(cut,s.m.grain)){
                    if(o.w<=f.w && o.h<=f.h){
                        s.used.push({...cut,x:f.x,y:f.y,w:o.w,h:o.h});
                        s.free.push({x:f.x+o.w,y:f.y,w:f.w-o.w,h:o.h});
                        s.free.push({x:f.x,y:f.y+o.h,w:f.w,h:f.h-o.h});
                        s.free=s.free.filter(r=>r.w>0&&r.h>0);
                        break outer;
                    }
                }
            }
        }
    });

    renderResult(sheets);
}

function renderResult(sheets){
    let total=0, used=0;
    sheets.forEach(s=>{
        total+=areaRect(s.m.length,s.m.width);
        s.used.forEach(u=>used+=areaRect(u.w,u.h));
    });
    let waste=total-used;

    result.innerHTML=`
        <p>Material: ${(total/1e6).toFixed(2)} m²</p>
        <p>Used: ${(used/1e6).toFixed(2)} m²</p>
        <p>Waste: ${(waste/1e6).toFixed(2)} m²</p>
        <p>Waste %: ${(waste/total*100).toFixed(2)}%</p>`;

    drawSheets(sheets);
}

function drawSheets(sheets){
    canvasContainer.innerHTML='';
    sheets.forEach(s=>{
        let c=document.createElement('canvas');
        c.width=250; c.height=180;
        let ctx=c.getContext('2d');
        let scale=Math.min(c.width/s.m.length,c.height/s.m.width);

        ctx.strokeRect(0,0,s.m.length*scale,s.m.width*scale);
        s.used.forEach(u=>ctx.strokeRect(u.x*scale,u.y*scale,u.w*scale,u.h*scale));

        canvasContainer.appendChild(c);
    });
}

function exportJSON(){
    let blob=new Blob([JSON.stringify(appState)],{type:'application/json'});
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='cutlist.json';
    a.click();
}

function exportPDF(){
    html2canvas(document.body).then(c=>{
        let pdf=new jspdf.jsPDF();
        pdf.addImage(c.toDataURL('image/png'),'PNG',0,0,200,0);
        pdf.save('result.pdf');
    });
}
</script></body>
</html>
