<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OptiCut Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: 'Inter', sans-serif; }
h1,h2 { font-family: 'Manrope', sans-serif; }
</style>
</head>

<body class="bg-slate-50 flex">

<aside class="w-64 bg-slate-100 p-4">
<h1 class="font-bold text-primary">OptiCut Pro</h1>

<button id="new-btn" class="mt-4 w-full bg-slate-200 p-2 rounded">Neues Projekt</button>

<div class="mt-6 space-y-2">
<label>Schnittfuge (mm)</label>
<input id="kerf" type="number" value="3" class="w-full p-2"/>

<label>Modus</label>
<select id="mode" class="w-full p-2">
<option value="free">Freies verschachteln</option>
<option value="guillotine">Guillotine</option>
</select>
</div>

<div class="mt-6 space-y-2">
<button id="export-json" class="w-full bg-slate-300 p-2 rounded">JSON</button>
<button id="export-csv" class="w-full bg-slate-300 p-2 rounded">CSV</button>
<button id="export-pdf" class="w-full bg-slate-300 p-2 rounded">PDF</button>

<input type="file" id="import-csv" class="w-full"/>
</div>

</aside>

<main class="flex-1 p-6">

<div id="sheet-container"></div>
<button id="add-sheet" class="mt-4 p-2 border">+ Platte</button>

<div id="cuts"></div>

<div id="results" class="mt-8"></div>

</main>

<script src="app.js"></script>
</body>
</html>
