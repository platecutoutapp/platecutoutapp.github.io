<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OptiCut Pro - Material-Konfiguration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        select { border: 1px solid #cbd5e1; }
        select:focus { outline: none; box-shadow: 0 0 0 3px rgba(0, 71, 141, 0.1), 0 0 0 2px #00478d; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: { extend: { colors: { primary: "#00478d", error: "#ba1a1a" } } }
        }
    </script>
    <!-- jsPDF für PDF-Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex min-h-screen overflow-hidden">

    <aside class="fixed left-0 top-0 h-full flex flex-col py-4 bg-slate-100 w-64 border-r z-40">
        <div class="px-6 mb-8">
            <h1 class="text-lg font-bold text-primary font-headline">OptiCut Pro</h1>
            <div class="mt-4 flex items-center gap-3 bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">architecture</span>
                </div>
                <div>
                    <p class="text-sm font-bold">Zuschnitt</p>
                    <p class="text-[10px] text-slate-500 uppercase">Multi-Optimierung</p>
                </div>
            </div>
        </div>
        <div class="px-4 mt-auto pt-4 border-t border-slate-200">
            <button id="new-calc-btn" class="w-full bg-slate-200 text-slate-700 py-2.5 rounded-md text-sm font-bold mb-4 hover:bg-slate-300 transition-colors">
                Neues Projekt
            </button>
        </div>
    </aside>

    <main class="ml-64 flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="sticky top-0 z-30 flex justify-between items-center w-full px-8 h-16 bg-white border-b border-slate-200 shrink-0">
            <h2 class="text-xl font-black text-primary font-headline uppercase">Konfiguration</h2>
            <div class="flex items-center gap-4">
                <button id="export-json-btn" class="flex items-center gap-2 border border-slate-300 px-4 py-2 rounded-md font-bold text-sm hover:bg-slate-50 transition-all">
                    <span class="material-symbols-outlined text-sm">download</span> JSON
                </button>
                <button id="export-csv-btn" class="flex items-center gap-2 border border-slate-300 px-4 py-2 rounded-md font-bold text-sm hover:bg-slate-50 transition-all">
                    <span class="material-symbols-outlined text-sm">table_chart</span> CSV
                </button>
                <button id="export-pdf-btn" class="flex items-center gap-2 border border-slate-300 px-4 py-2 rounded-md font-bold text-sm hover:bg-slate-50 transition-all">
                    <span class="material-symbols-outlined text-sm">picture_as_pdf</span> PDF
                </button>
                <label id="import-csv-label" class="flex items-center gap-2 border border-slate-300 px-4 py-2 rounded-md font-bold text-sm hover:bg-slate-50 transition-all cursor-pointer">
                    <span class="material-symbols-outlined text-sm">upload</span> CSV Import
                    <input id="import-csv" type="file" accept=".csv,.xlsx" style="display:none"/>
                </label>
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 space-y-8">
                    <!-- SCHNITTFUGE & ALGORITHMUS KONFIGURATION -->
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <h4 class="font-bold text-lg mb-4">Schnitteinstellungen</h4>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Sägeblattstärke (mm)</label>
                                <input id="saw-blade-thickness" type="number" value="3" min="0" max="10" step="0.5" class="w-full border-slate-200 rounded-lg text-sm p-3 focus:ring-primary" onchange="window.updateSawBladeThickness(this.value)"/>
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Schnittmodus</label>
                                <select id="cutting-mode" class="w-full border-slate-200 rounded-lg text-sm p-3 focus:ring-primary" onchange="window.updateCuttingMode(this.value)">
                                    <option value="free">Freies Verschachteln</option>
                                    <option value="guillotine">Guillotine-Schnitt</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div id="sheet-container" class="space-y-4"></div>
                    <button id="add-sheet-btn" class="w-full border-2 border-dashed border-slate-300 hover:border-primary hover:bg-primary/5 transition-all py-6 rounded-xl flex items-center justify-center gap-3 text-slate-500 hover:text-primary font-bold text-sm">
                        <span class="material-symbols-outlined">add_circle</span> Weiteres Plattenformat hinzufügen
                    </button>
                    
                    <div id="cut-list-section"></div>
                    
                    <div id="results-canvas-container" class="space-y-6 pt-10 border-t border-slate-200 hidden">
                        <h4 class="text-2xl font-bold font-headline">Optimierter Schnittplan</h4>
                        <div id="canvas-list" class="space-y-8"></div>
                    </div>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div class="sticky top-24">
                        <div class="bg-primary text-white p-6 rounded-xl shadow-lg mb-6">
                            <h5 class="font-bold text-xs uppercase opacity-80 mb-4">Materialbedarf</h5>
                            <div class="flex items-end gap-2">
                                <span id="stat-sheets-count" class="text-4xl font-black font-headline">0</span>
                                <span class="text-sm font-bold opacity-80 mb-1.5">Platten</span>
                            </div>
                            <div class="mt-4 flex justify-between text-[10px] font-bold uppercase">
                                <span>Gesamt</span>
                                <span id="stat-total-area">0.00 m²</span>
                            </div>
                        </div>
                        
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h5 class="font-bold text-xs uppercase text-slate-400 mb-3">Flächenstatistiken</h5>
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between">
                                    <span class="text-slate-600">Gesamtfläche:</span>
                                    <span class="font-bold"><span id="stat-total-area-abs">0.00</span> m²</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-slate-600">Genutzte Fläche:</span>
                                    <span class="font-bold text-green-600"><span id="stat-used-area">0.00</span> m²</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-slate-600">Verschnittfläche:</span>
                                    <span class="font-bold text-red-600"><span id="stat-waste-area">0.00</span> m²</span>
                                </div>
                                <div class="h-2 bg-slate-200 rounded-full mt-3 overflow-hidden">
                                    <div id="stat-waste-bar" class="h-full bg-red-500 transition-all" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between text-[10px] text-slate-500">
                                    <span>Verschnittquote:</span>
                                    <span id="stat-waste-percent">0.00%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
